<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>飲みに行こう？</title>

    <meta property="og:title" content="お伺い">
    <meta property="og:description" content="朝まで飲みに行こう？">
    <meta property="og:type" content="website">
    
    <style>
        
        body {
            background-color: #ffe4e1;
            text-align: center;
            font-family: sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            padding: 20px;
        }

        h1 {
            color: #d1547a;
            font-size: 1.5rem;
            margin-bottom: 2rem;
            min-height: 3rem; 
            transition: all 0.3s;
        }

        .btn-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 300px;
        }

        button {
            font-size: 1.25rem;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        #yesBtn {
            background-color: #ff69b4;
            color: white;
            transition: all 0.2s ease;
        }

        #noBtn {
            background-color: #a9a9a9;
            color: white;
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            transition: left 0.1s ease, top 0.1s ease;
            z-index: 10;
        }
    </style>
</head>
<body>

    <h1 id="message">朝まで飲みに行こう？ </h1>
    
    <div class="btn-container">
        <button id="yesBtn">Yes</button>
        <button id="noBtn">No</button>
    </div>

    <script>
        // カウンター
        var noCount = 0;
        var yesPadding = 1.5; 
        var yesFontSize = 1.25; 

        // ループ
        var replies = [
            "嘘やんね？ ",
            "お願いです🥺",
            "もう一回考えて？",
            "後悔しない？ ",
            "そこのイケメン！Yes押して♡"
        ];

        var yesBtn = document.getElementById('yesBtn');
        var noBtn = document.getElementById('noBtn');
        var message = document.getElementById('message');

        // Noボタンが逃げる関数
        function moveButton(e) {
            e.preventDefault();

            if (noCount < replies.length) {
                message.innerHTML = replies[noCount];
            } else {
                message.innerHTML = "もうYesしかないからね〜";
            }

            // Yesを大きくする
            yesPadding += 0.5;
            yesFontSize += 0.1;
            yesBtn.style.padding = (yesPadding * 0.5) + "rem " + yesPadding + "rem";
            yesBtn.style.fontSize = yesFontSize + "rem";

            // ランダムで移動
            var padding = 50; 
            var maxX = window.innerWidth - noBtn.offsetWidth - padding;
            var maxY = window.innerHeight - noBtn.offsetHeight - padding;

            var randomX = Math.max(padding, Math.random() * (maxX - padding) + padding);
            var randomY = Math.max(padding, Math.random() * (maxY - padding) + padding);

            noBtn.style.position = 'fixed'; 
            noBtn.style.left = randomX + "px";
            noBtn.style.top = randomY + "px";
            noBtn.style.transform = 'none'; 

            noCount++;
        }

        // Yesを押したとき
        function celebrate() {
            message.innerHTML = "やった！都合の良い日教えてください！いっぱいのも〜☺";
            noBtn.style.display = 'none';
            yesBtn.style.transform = 'scale(1.3)';
        }

        // イベント設定
        noBtn.addEventListener('touchstart', moveButton, { passive: false });
        noBtn.addEventListener('mouseover', moveButton);
        noBtn.addEventListener('click', moveButton);
        
        yesBtn.addEventListener('click', celebrate);
    </script>
</body>
</html>
